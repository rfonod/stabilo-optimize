name: "Continuous integration: lint, test suite, and packaging smoke test"

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: python -m pip install --upgrade pip ruff
      - name: Ruff check (errors only)
        run: ruff check --select F,E9 --output-format=github .

  test:
    name: Test (${{ matrix.os }}, Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        include:
          - os: macos-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.11"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install system dependencies (Linux, for OpenCV)
        if: runner.os == 'Linux'
        run: |
          for repo_file in \
            /etc/apt/sources.list.d/microsoft-prod.list \
            /etc/apt/sources.list.d/azure-cli.list \
            /etc/apt/sources.list.d/packages-microsoft-prod.list \
            /etc/apt/sources.list.d/microsoft-prod.sources \
            /etc/apt/sources.list.d/azure-cli.sources; do
            if [ -f "$repo_file" ]; then
              sudo rm -f "$repo_file"
            fi
          done
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libgl1 libglib2.0-0
      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Run tests
        run: pytest

  build:
    name: Build & packaging smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: twine check dist/*
      - name: Install the built wheel
        run: python -m pip install dist/*.whl
      - name: Smoke-test console script
        run: |
          stabilo-optimize --version
          stabilo-optimize --help
