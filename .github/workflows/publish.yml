name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine
      - name: Build distributions
        run: python -m build
      - name: Check distributions
        run: twine check dist/*
      - name: Upload distributions artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/stabilo-optimize
    permissions:
      id-token: write  # trusted publishing (OIDC); no API token needed
    steps:
      - name: Download distributions artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # tolerate a re-created release for the same version (e.g. when retrying a
          # failed GitHub -> Zenodo archive): skip files already on PyPI instead of erroring.
          skip-existing: true
